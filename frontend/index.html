<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ricochet Robots</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 24px 16px;
      gap: 20px;
    }

    h1 {
      font-size: 1.6rem;
      letter-spacing: 2px;
      color: #a0c4ff;
      text-transform: uppercase;
    }

    /* ── Board ─────────────────────────────────────────────── */
    #board {
      display: grid;
      grid-template-columns: repeat(16, 1fr);
      grid-template-rows: repeat(16, 1fr);
      width: min(80vw, 576px);
      height: min(80vw, 576px);
      border: 3px solid #8888aa;
      background: #0d1b2a;
    }

    /* Borders are managed entirely via JS inline styles */
    .cell {
      position: relative;
      cursor: default;
      background: #0d1b2a;
    }

    .cell.blocked {
      background: #060e18;
    }

    /* ── Target ─────────────────────────────────────────────── */
    .target-ring {
      position: absolute;
      inset: 14%;
      border-radius: 50%;
      border: 2px solid var(--tc, #fff);
      opacity: 0.7;
      pointer-events: none;
      z-index: 1;
    }
    .target-cross-h {
      position: absolute;
      top: 50%; left: 14%;
      width: 72%; height: 2px;
      background: var(--tc, #fff);
      transform: translateY(-50%);
      opacity: 0.85;
      pointer-events: none;
      z-index: 1;
    }
    .target-cross-v {
      position: absolute;
      left: 50%; top: 14%;
      height: 72%; width: 2px;
      background: var(--tc, #fff);
      transform: translateX(-50%);
      opacity: 0.85;
      pointer-events: none;
      z-index: 1;
    }

    /* ── Robot ──────────────────────────────────────────────── */
    .robot {
      position: absolute;
      inset: 10%;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.55rem;
      font-weight: bold;
      color: rgba(255,255,255,0.9);
      cursor: pointer;
      z-index: 3;
      transition: box-shadow 0.1s;
    }

    .robot:hover { filter: brightness(1.2); }

    .robot.selected {
      border-color: #fff;
      box-shadow: 0 0 0 2px rgba(255,255,255,0.7);
    }

    .robot[data-color="red"]    { background: #cc2828; }
    .robot[data-color="blue"]   { background: #1a55c0; }
    .robot[data-color="green"]  { background: #1a9044; }
    .robot[data-color="yellow"] { background: #c0a000; }
    .robot[data-color="gray"]   { background: #606870; }

    /* ── Controls ──────────────────────────────────────────── */
    #controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    #message {
      min-height: 1.5rem;
      font-size: 1rem;
      color: #ffdd88;
      text-align: center;
    }
    #message.won     { color: #80ff80; font-weight: bold; font-size: 1.2rem; }
    #message.illegal { color: #ff8080; }

    .dir-grid {
      display: grid;
      grid-template-columns: repeat(3, 48px);
      grid-template-rows: repeat(3, 48px);
      gap: 4px;
    }

    .dir-grid button {
      width: 48px; height: 48px;
      border: none; border-radius: 8px;
      background: #2a3f5f;
      color: #a0c4ff;
      font-size: 1.2rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    .dir-grid button:hover:not(:disabled) { background: #3a5f8f; }
    .dir-grid button:disabled { opacity: 0.3; cursor: default; }
    .dir-grid .empty { background: transparent; pointer-events: none; }

    #btn-new {
      padding: 10px 28px;
      border: none; border-radius: 8px;
      background: #3a5f3a;
      color: #a0ffa0;
      font-size: 1rem; cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.15s;
    }
    #btn-new:hover:not(:disabled) { background: #4a7f4a; }
    #btn-new:disabled { opacity: 0.4; cursor: default; }

    #move-count { font-size: 0.9rem; color: #8899aa; }

    /* ── Legend ─────────────────────────────────────────────── */
    #legend { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }

    .legend-item {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.8rem; color: #8899aa;
      cursor: pointer; padding: 4px 8px;
      border-radius: 6px; border: 1px solid transparent;
      transition: border-color 0.15s;
    }
    .legend-item.active { border-color: rgba(255,255,255,0.4); color: #e0e0e0; }

    .legend-dot { width: 14px; height: 14px; border-radius: 50%; }
  </style>
</head>
<body>

<h1>Ricochet Robots</h1>

<div id="board"></div>

<div id="controls">
  <div id="message">Loading...</div>
  <div id="move-count"></div>

  <div class="dir-grid">
    <div class="empty"></div>
    <button id="btn-up"    onclick="doMove('up')">&#8593;</button>
    <div class="empty"></div>
    <button id="btn-left"  onclick="doMove('left')">&#8592;</button>
    <div class="empty"></div>
    <button id="btn-right" onclick="doMove('right')">&#8594;</button>
    <div class="empty"></div>
    <button id="btn-down"  onclick="doMove('down')">&#8595;</button>
    <div class="empty"></div>
  </div>

  <div id="legend"></div>
  <button id="btn-new" onclick="newPuzzle()">New Puzzle</button>
</div>

<script>
const API = 'http://127.0.0.1:8000';

const ROBOT_HEX = {
  red: '#cc2828', blue: '#1a55c0',
  green: '#1a9044', yellow: '#c0a000', gray: '#606870'
};
const TARGET_HEX = {
  red: '#ff5555', blue: '#4499ff',
  green: '#44dd77', yellow: '#ffdd33',
  gray: '#aaaaaa', wildcard: '#ffffff'
};
const BUMPER_HEX = {
  red: '#ff6060', blue: '#5599ff',
  green: '#55dd88', yellow: '#ffe055',
  gray: '#aaaaaa'
};
const ROBOT_LABEL = { red:'R', blue:'B', green:'G', yellow:'Y', gray:'W' };

// Wall border styles
const WALL_STYLE = '3px solid #c8c8d8';
const THIN_STYLE = '1px solid #1a3050';

let sessionId = null;
let state     = null;
let wallMap   = {};   // "r,c" -> {top,bottom,left,right}
let animating = false;
let selectedColor = null;
let moveCount = 0;

// ── Board construction ───────────────────────────────────────

function cellId(r, c) { return `cell-${r}-${c}`; }

function buildBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  for (let r = 0; r < 16; r++) {
    for (let c = 0; c < 16; c++) {
      const div = document.createElement('div');
      div.className = 'cell';
      div.id = cellId(r, c);
      board.appendChild(div);
    }
  }
}

// ── Wall map ─────────────────────────────────────────────────

function buildWallMap(walls) {
  const map = {};
  for (const [a, b] of walls) {
    const [r1, c1] = a;
    const [r2, c2] = b;
    const k1 = `${r1},${c1}`;
    const k2 = `${r2},${c2}`;
    if (!map[k1]) map[k1] = {};
    if (!map[k2]) map[k2] = {};

    const dr = r2 - r1, dc = c2 - c1;
    if      (dr ===  1) { map[k1].bottom = true; map[k2].top   = true; }
    else if (dr === -1) { map[k1].top    = true; map[k2].bottom = true; }
    else if (dc ===  1) { map[k1].right  = true; map[k2].left  = true; }
    else                { map[k1].left   = true; map[k2].right  = true; }
  }
  return map;
}

// ── Full render ──────────────────────────────────────────────

function renderAll(st) {
  // 1. Reset every cell
  for (let r = 0; r < 16; r++) {
    for (let c = 0; c < 16; c++) {
      const cell = document.getElementById(cellId(r, c));
      cell.className = 'cell';
      cell.innerHTML = '';
      const w = wallMap[`${r},${c}`] ?? {};
      cell.style.cssText = [
        `border-top:${w.top       ? WALL_STYLE : THIN_STYLE}`,
        `border-bottom:${w.bottom ? WALL_STYLE : THIN_STYLE}`,
        `border-left:${w.left     ? WALL_STYLE : THIN_STYLE}`,
        `border-right:${w.right   ? WALL_STYLE : THIN_STYLE}`,
        'background:#0d1b2a',
      ].join(';');
    }
  }

  // 2. Blocked cells
  for (const [r, c] of (st.blocked_cells ?? [])) {
    const cell = document.getElementById(cellId(r, c));
    cell.style.background = '#060e18';
  }

  // 3. Bumpers — SVG diagonal line
  for (const b of (st.bumpers ?? [])) {
    const [r, c] = b.position;
    const cell = document.getElementById(cellId(r, c));
    const stroke = BUMPER_HEX[b.color] ?? '#aaaaaa';
    // '/' → bottom-left to top-right; '\' → top-left to bottom-right
    const [x1, y1, x2, y2] = b.diagonal === '/'
      ? [5, 95, 95, 5]
      : [5,  5, 95, 95];
    cell.insertAdjacentHTML('beforeend',
      `<svg viewBox="0 0 100 100" preserveAspectRatio="none"
            style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:1">
        <line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}"
              stroke="${stroke}" stroke-width="12" stroke-linecap="round"/>
      </svg>`
    );
  }

  // 4. Target
  if (st.target) {
    const [tr, tc] = st.target.position;
    const cell = document.getElementById(cellId(tr, tc));
    const hex = TARGET_HEX[st.target.color ?? 'wildcard'] ?? '#ffffff';
    cell.insertAdjacentHTML('beforeend',
      `<div class="target-ring"  style="--tc:${hex}"></div>
       <div class="target-cross-h" style="--tc:${hex}"></div>
       <div class="target-cross-v" style="--tc:${hex}"></div>`
    );
  }

  // 5. Robots
  for (const [color, pos] of Object.entries(st.robots)) {
    placeRobotEl(color, pos[0], pos[1]);
  }

  updateLegend(st.robots);
  updateButtons();
}

function placeRobotEl(color, r, c) {
  const cell = document.getElementById(cellId(r, c));
  const div = document.createElement('div');
  div.className = 'robot' + (color === selectedColor ? ' selected' : '');
  div.dataset.color = color;
  div.title = color;
  div.textContent = ROBOT_LABEL[color] ?? color[0].toUpperCase();
  div.onclick = e => { e.stopPropagation(); selectRobot(color); };
  cell.appendChild(div);
  return div;
}

// ── Selection ────────────────────────────────────────────────

function selectRobot(color) {
  if (animating) return;
  selectedColor = color;
  // Refresh selected highlight without full re-render
  document.querySelectorAll('.robot').forEach(el => {
    el.classList.toggle('selected', el.dataset.color === color);
  });
  document.querySelectorAll('.legend-item').forEach(el => {
    el.classList.toggle('active', el.dataset.color === color);
  });
  setMessage(`${color} robot selected`);
  updateButtons();
}

// ── Legend ───────────────────────────────────────────────────

function updateLegend(robots) {
  const legend = document.getElementById('legend');
  legend.innerHTML = '';
  for (const color of Object.keys(robots)) {
    const item = document.createElement('div');
    item.className = 'legend-item' + (color === selectedColor ? ' active' : '');
    item.dataset.color = color;
    item.onclick = () => selectRobot(color);
    const dot = document.createElement('div');
    dot.className = 'legend-dot';
    dot.style.background = ROBOT_HEX[color] ?? '#888';
    item.appendChild(dot);
    item.appendChild(document.createTextNode(color));
    legend.appendChild(item);
  }
}

function updateButtons() {
  const off = !selectedColor || animating;
  ['btn-up','btn-down','btn-left','btn-right'].forEach(id => {
    document.getElementById(id).disabled = off;
  });
}

function setMessage(text, cls = '') {
  const el = document.getElementById('message');
  el.textContent = text;
  el.className = cls;
}

function setMoveCount(n) {
  document.getElementById('move-count').textContent = n > 0 ? `Moves: ${n}` : '';
}

// ── Waypoint animation ───────────────────────────────────────

async function animateWaypoints(color, waypoints) {
  if (!waypoints || waypoints.length < 2) return;
  const STEP_MS = 75;

  // Remove robot from start
  const [sr, sc] = waypoints[0];
  document.getElementById(cellId(sr, sc)).querySelector('.robot')?.remove();

  for (let i = 1; i < waypoints.length; i++) {
    const [pr, pc] = waypoints[i - 1];
    document.getElementById(cellId(pr, pc)).querySelector('.robot')?.remove();

    const [r, c] = waypoints[i];
    placeRobotEl(color, r, c);
    await new Promise(res => setTimeout(res, STEP_MS));
  }
}

// ── API ──────────────────────────────────────────────────────

async function newPuzzle() {
  document.getElementById('btn-new').disabled = true;
  selectedColor = null;
  moveCount = 0;
  setMessage('Loading...');
  setMoveCount(0);

  try {
    const res = await fetch(`${API}/practice`, { method: 'POST' });
    if (!res.ok) throw new Error(`Server error ${res.status}`);
    const data = await res.json();
    sessionId = data.session_id;
    state = data.state;
    wallMap = buildWallMap(state.walls ?? []);
    buildBoard();
    renderAll(state);
    const tc = state.target?.color ?? 'wildcard';
    setMessage(`Target: ${tc} — select a robot and move!`);
  } catch (err) {
    setMessage(`Error: ${err.message}`, 'illegal');
  } finally {
    document.getElementById('btn-new').disabled = false;
    updateButtons();
  }
}

async function doMove(direction) {
  if (!selectedColor || !sessionId || animating) return;
  animating = true;
  updateButtons();

  try {
    const res = await fetch(`${API}/practice/${sessionId}/move`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ color: selectedColor, direction })
    });
    if (!res.ok) throw new Error(`Server error ${res.status}`);
    const data = await res.json();

    const waypoints = data.waypoints ?? [];
    const moved = waypoints.length > 1;

    if (!moved) {
      setMessage(data.message || 'Illegal move', 'illegal');
    } else {
      await animateWaypoints(selectedColor, waypoints);
      state = data.state;
      moveCount++;
      setMoveCount(moveCount);
      // Re-render everything so bumpers/walls stay correct after full state update
      renderAll(state);

      if (data.won) {
        setMessage(`Solved in ${moveCount} move${moveCount !== 1 ? 's' : ''}!`, 'won');
        selectedColor = null;
        updateButtons();
      } else {
        setMessage(`${selectedColor} moved ${direction}`);
      }
    }
  } catch (err) {
    setMessage(`Error: ${err.message}`, 'illegal');
  } finally {
    animating = false;
    updateButtons();
  }
}

// ── Keyboard ─────────────────────────────────────────────────

const KEY_COLOR = { r:'red', b:'blue', g:'green', y:'yellow', w:'gray' };
const KEY_DIR   = { ArrowUp:'up', ArrowDown:'down', ArrowLeft:'left', ArrowRight:'right' };

document.addEventListener('keydown', e => {
  if (e.key in KEY_DIR) {
    e.preventDefault();
    doMove(KEY_DIR[e.key]);
  } else if (e.key.toLowerCase() in KEY_COLOR && state) {
    const color = KEY_COLOR[e.key.toLowerCase()];
    if (state.robots[color]) selectRobot(color);
  }
});

// ── Init ─────────────────────────────────────────────────────
buildBoard();
newPuzzle();
</script>
</body>
</html>
